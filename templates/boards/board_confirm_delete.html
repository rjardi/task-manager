{% extends 'base.html' %}

{% block title %}Eliminar Tablero{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-body">
                <h4>¿Eliminar el tablero "{{ board.name }}"?</h4>
                <p>Se eliminarán todas las listas y tareas asociadas. Esta acción no se puede deshacer.</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                    <a href="{% url 'board_detail' board.pk %}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
